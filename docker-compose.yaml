services:
  warehouse:
    image: postgres:13
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - dm_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 1m30s
      timeout: 5s
      retries: 3
      start_period: 5s
  
  warehouseui:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    volumes:
      - db-ui-data:/var/lib/pgadmin
    ports:
      - "8085:80"
    networks:
      - dm_net
    depends_on:
      warehouse:
        condition: service_healthy
    
  scheduler:
    # Si usas el Dockerfile personalizado, cambia 'image' por 'build: .'
    build: .
    volumes:
      - scheduler-data:/home/src
    ports:
      - "6789:6789"
    # El comando inicia el planificador de Mage AI
    command: /app/run_app.sh mage start scheduler
    networks:
      - dm_net
    depends_on:
      warehouse:
        condition: service_healthy
  
volumes:
  db-data:
  db-ui-data:
  scheduler-data:

networks:
  dm_net:
    driver: bridge
